<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Arc~en~Ciel TOUR 2026 日程調整</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>L'Arc~en~Ciel</h1>
            <p class="subtitle">TOUR 2026 SCHEDULE</p>
        </header>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="new-person-name" placeholder="新しい参加者の名前" autocomplete="off">
                <button id="add-person-btn"><i class="fas fa-plus"></i> 追加</button>
            </div>
        </div>

        <div class="table-container">
            <table id="schedule-table">
                <thead>
                    <tr id="table-head-row">
                        <th class="sticky-col">公演日程</th>
                        <!-- 参加者名がここに追加されます -->
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- スケジュールがここに追加されます -->
                </tbody>
            </table>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
